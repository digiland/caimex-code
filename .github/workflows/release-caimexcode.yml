# Builds caimexcode binaries for all platforms and publishes them to a GitHub
# Release (plus install.sh, so the curl one-liner works via
# releases/latest/download/install.sh). Optionally publishes the `caimexcode`
# npm package when an NPM_TOKEN secret is configured.
#
# Trigger: push a tag like v1.0.0, or run manually with a version input.
#
# Upstream OpenCode workflows are parked in .github/workflows-upstream/ — they
# assume upstream's secrets, bots, and npm packages and must not run here.
name: Release Caimex Code

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the v prefix (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

concurrency: release-caimexcode

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - run: bun install

      - name: Build binaries for all targets
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_CHANNEL: latest
        run: ./build-caimexcode.sh

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "Caimex Code $TAG" \
            --notes "Install: \`curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install.sh | bash\` or \`npm i -g caimexcode\`" \
            || echo "release $TAG already exists, uploading assets"
          gh release upload "$TAG" packages/caimexcode/* install.sh --clobber

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish caimexcode to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: npm/caimexcode
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish"
            exit 0
          fi
          npm version "${{ needs.release.outputs.version }}" --no-git-tag-version
          npm publish --access public
