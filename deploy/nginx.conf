server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve the binaries as raw downloads.
    default_type application/octet-stream;
    types {
        text/x-shellscript sh;
        application/json   json;
    }

    location / {
        autoindex off;
        try_files $uri =404;
    }
}
